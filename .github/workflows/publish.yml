name: Publish

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.25"
      - run: go build ./... && go vet ./...
      - name: Tag and Release
        run: |
          VERSION=$(grep -oP 'version\s+\K[0-9.]+' go.mod 2>/dev/null || head -1 CHANGELOG.md | grep -oP '\d+\.\d+\.\d+' || echo "")
          [ -z "$VERSION" ] && echo "No version found" && exit 0
          git tag "v${VERSION}" 2>/dev/null || echo "Tag exists"
          git push --tags
          if [ -f CHANGELOG.md ]; then
            gh release create "v${VERSION}" --title "v${VERSION}" --notes-file CHANGELOG.md
          else
            gh release create "v${VERSION}" --title "v${VERSION}" --generate-notes
          fi
        env:
          GH_TOKEN: ${{ github.token }}
